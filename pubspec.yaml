name: tickki_chat_flutter
description: "Tickki Chat SDK for Flutter — embed live agent chat into your app with a drop-in widget or headless primitives."
version: 0.2.1
homepage: https://app.tickki.com/developers
repository: https://github.com/utiegbai/tickki_chat_flutter
issue_tracker: https://github.com/utiegbai/tickki_chat_flutter/issues
documentation: https://app.tickki.com/developers/docs

# Topics surface in pub.dev search facets and on the package landing
# page. Lowercase, hyphens allowed, max 5.
topics:
  - chat
  - messaging
  - live-chat
  - customer-support
  - tickki

environment:
  sdk: ^3.9.2
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  # Pure-Dart HTTP for the REST surface. We deliberately don't pull
  # dio in — keeping transitive deps tiny is a feature for an SDK.
  http: ^1.2.0
  # WebSocket for the realtime subscription. We speak the Pusher
  # protocol directly over `web_socket_channel` rather than via the
  # `pusher_channels_flutter` package because that package's native
  # iOS/Android SDKs auto-construct the WS URL from a `cluster` name
  # and don't expose a `host` override — fine for Pusher Cloud,
  # useless for a self-hosted Reverb at `ws.tickki.com`. Pusher's
  # wire protocol is simple enough that a custom client is cleaner
  # than fighting the native bridges (the Tickki agent app made the
  # same call in its `ReverbService`).
  web_socket_channel: ^3.0.1
  # Used to auto-detect the host app's bundle id (Android package /
  # iOS bundle identifier) at runtime so the SDK can send
  # X-Tickki-Bundle-Id without consumers having to pass it manually.
  # If they pass `bundleId:` explicitly we skip the lookup.
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  # No assets bundled with the SDK. The drop-in widget pulls branding
  # (colors, logo URL, welcome copy) from the GET /chat/config response
  # at runtime, so the package itself stays asset-free.
